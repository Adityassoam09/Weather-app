<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEATHER-APP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="background-color: black;">
    
    <div class="main">
        
      <header>
        <div id="nav">
            
          <h1 id="inpval"> 📍Meerut</h1>
          <input type="text" placeholder="   Please Enter Your City📍 Name "/>
        </div>
      </header>

      <main>
        <img src=https://i.pinimg.com/736x/aa/e6/34/aae6347966aae6b620f163751c794c63.jpg class="weather-img">

        <h1 id="temp">39°</h1>
        <p id="feel">Feels like 44°C Very Hot</p>
        
      </main>

      

      <footer>
        <section>
          <div class="box">
            <h1>💧</h1>
            <h3 id="humi">18%</h3>
            <p>Humidity</p>
          </div>
          <div class="box">
            <h1>💨</h1>
            <h3 id="wind">24 km/h</h3>
            <p>Wind</p>
          </div>
          <div class="box">
            <h1>🌞</h1>
            <h3>UV 11</h3>
            <p>Index</p>
          </div>
        </section>
      </footer>
    </div>

   
<script src="script.js"></script>
  </body>
</html>
